<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Codex Review Result</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #101214;
        color: #f5f0e8;
      }
      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
      }
      section {
        max-width: 760px;
        border: 1px solid #2d3238;
        border-radius: 8px;
        background: #171a1e;
        padding: 28px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 32px;
      }
      p {
        color: #b8c0c8;
        line-height: 1.6;
      }
      .status {
        color: #6ee7b7;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <p class="status">Ready to review</p>
        <h1>Codex finished polishing the landing page</h1>
        <p>This local HTML stands in for a real Codex delivery. In the P0 demo, PeekDock opens this page when the dock sends an <code>open_result</code> action.</p>
      </section>
    </main>
  </body>
</html>
